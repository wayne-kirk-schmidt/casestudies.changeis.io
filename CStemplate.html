<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Case Study · ChangeIS</title>
<link rel="preload" href="./background.webp" as="image" type="image/webp"/>
<link rel="dns-prefetch" href="https://changeis.io"/>
<link rel="stylesheet" href="./styles.css"/>
</head>
<body>

<nav>
  <a class="nav-logo" href="./index.html">Case Studies</a>
  <div class="nav-center">
    All case studies follow the <a href="./explainer.html">S·T·A·R·R·Y</a> format
  </div>
  <ul class="nav-links">
    <li><a href="https://changeis.io/#domains">Domains</a></li>
    <li><a href="https://changeis.io/#approach">Approach</a></li>
  </ul>
</nav>

<div class="page-wrap">
  <div class="cs-container" id="cs-container">
    <div class="loading">Loading case study...</div>
  </div>

  <footer>
    <div class="footer-links">
      <a class="footer-link" href="https://www.waynekirkschmidt.me">Wayne Kirk Schmidt</a>
      <a class="footer-link" href="https://changeis.io">ChangeIS</a>
    </div>
    <div class="footer-copy">ChangeIS &copy; 2026 &middot; Boston &middot; Tokyo &middot; Global</div>
  </footer>
</div>

<script>
const STARRY = ['situation','task','action','result','return','yield'];
const LABELS  = ['Situation','Task','Action','Result','Return','Yield'];

async function boot() {
  const id = new URLSearchParams(window.location.search).get('id');
  if (!id) { renderError('No case study ID specified.'); return; }

  // Single fetch for all cases — same file index.html already cached
  const allCases = await fetch('./casestudies.json').then(r => r.json());
  const idx = allCases.findIndex(c => c.id === id);

  if (idx === -1) { renderError(`Case study "${id}" not found.`); return; }

  const cs     = allCases[idx];
  const prevId = allCases[idx > 0 ? idx - 1 : allCases.length - 1].id;
  const nextId = allCases[idx < allCases.length - 1 ? idx + 1 : 0].id;

  document.title = `${cs.name} · ChangeIS Case Study`;
  renderCase(cs, prevId, nextId);
}

function renderCase(cs, prevId, nextId) {
  const allTags = [...(cs.location||[]), ...(cs.industry||[]), ...(cs.discipline||[])];
  const metaTags = allTags.map(t => `<span class="cs-meta-tag">${t}</span>`).join('');

  const rows = STARRY.map((key, i) => {
    const content = cs.starry[key];
    const cell = content
      ? `<td>${content}</td>`
      : `<td class="cs-stub">Coming soon.</td>`;
    return `
      <tr>
        <th><span class="starry-letter">${LABELS[i][0]}</span>${LABELS[i].slice(1)}</th>
        ${cell}
      </tr>`;
  }).join('');

  document.getElementById('cs-container').innerHTML = `
    <div class="cs-card">
      <div class="cs-header">
        <div class="cs-eyebrow">Case Study</div>
        <div class="cs-name">${cs.name}</div>
        <div class="cs-tagline">${cs.tagline}</div>
        <div class="cs-meta">${metaTags}</div>
      </div>
      <table>${rows}</table>
    </div>
    <div class="cs-nav">
      <a href="./CStemplate.html?id=${prevId}">&larr; Prev</a>
      <a href="./index.html">Gallery</a>
      <a href="./CStemplate.html?id=${nextId}">Next &rarr;</a>
    </div>
  `;
}

function renderError(msg) {
  document.getElementById('cs-container').innerHTML = `
    <div class="cs-card">
      <p style="color:var(--light);font-style:italic;">${msg}</p>
      <div class="cs-nav"><a href="./index.html">Back to Gallery</a></div>
    </div>`;
}

boot();
</script>
</body>
</html>
