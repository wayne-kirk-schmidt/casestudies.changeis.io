<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Project Delivery — Case Studies · ChangeIS</title>
<link rel="stylesheet" href="./styles.css"/>
</head>
<body>

<header>
  <div>
    <div class="header-title">Project Delivery Case Studies</div>
  </div>
  <div class="header-links">
    <a class="header-link starry-link" href="./explainer.html">All case studies follow the <span class="starry-letters">S·T·A·R·R·Y</span> format</a>
  </div>
</header>

<div class="filter-strip">
  <div class="filter-strip-inner">
    <div class="filter-row">
      <span class="filter-label">Location</span>
      <div class="chips" id="chips-location"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Industry</span>
      <div class="chips" id="chips-industry"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Discipline</span>
      <div class="chips" id="chips-discipline"></div>
    </div>
    <div class="filter-actions">
      <button class="clear-btn" id="clearBtn">Clear filters</button>
    </div>
  </div>
</div>

<main>
  <div class="carousel-track" id="carouselTrack">
    <div class="loading">Loading case studies...</div>
  </div>
  <div class="carousel-controls">
    <button class="carousel-btn" id="btn-prev" disabled>&#8592;</button>
    <span class="carousel-info" id="page-info"></span>
    <button class="carousel-btn" id="btn-next" disabled>&#8594;</button>
  </div>
</main>

<footer>
  <div class="footer-links">
    <a class="footer-link" href="https://www.waynekirkschmidt.me">Wayne Kirk Schmidt</a>
    <a class="footer-link" href="https://changeis.io">ChangeIS</a>
    <a class="footer-link" href="https://changeis.io/#contact">Engage</a>
  </div>
  <div class="footer-copy">ChangeIS &copy; 2026 &middot; Boston &middot; Tokyo &middot; Global</div>
</footer>

<script>
const PAGE_SIZE = 3;
let allCases = [];
let filtered = [];
let page = 0;
let activeFilters = { location: new Set(), industry: new Set(), discipline: new Set() };

async function boot() {
  const res = await fetch('./manifest.json');
  const ids = await res.json();
  allCases = await Promise.all(ids.map(id => fetch(`./casestudies/${id}.json`).then(r => r.json())));
  buildFilters();
  applyFilters();
}

function buildFilters() {
  const tags = { location: new Set(), industry: new Set(), discipline: new Set() };
  allCases.forEach(cs => {
    (cs.location  || []).forEach(v => tags.location.add(v));
    (cs.industry  || []).forEach(v => tags.industry.add(v));
    (cs.discipline|| []).forEach(v => tags.discipline.add(v));
  });
  renderChips('chips-location',   [...tags.location].sort(),   'location');
  renderChips('chips-industry',   [...tags.industry].sort(),   'industry');
  renderChips('chips-discipline', [...tags.discipline].sort(), 'discipline');
}

function renderChips(containerId, values, filterKey) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  values.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = val;
    btn.setAttribute('aria-pressed', 'false');
    btn.addEventListener('click', () => {
      const active = activeFilters[filterKey];
      if (active.has(val)) { active.delete(val); btn.setAttribute('aria-pressed', 'false'); }
      else { active.add(val); btn.setAttribute('aria-pressed', 'true'); }
      page = 0;
      applyFilters();
    });
    container.appendChild(btn);
  });
}

function applyFilters() {
  filtered = allCases.filter(cs => {
    const locOk = activeFilters.location.size   === 0 || (cs.location  || []).some(v => activeFilters.location.has(v));
    const indOk = activeFilters.industry.size   === 0 || (cs.industry  || []).some(v => activeFilters.industry.has(v));
    const disOk = activeFilters.discipline.size === 0 || (cs.discipline|| []).some(v => activeFilters.discipline.has(v));
    return locOk && indOk && disOk;
  });
  renderPage();
}

function renderPage() {
  const grid  = document.getElementById('carouselTrack');
  const start = page * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results" style="display:block;">No case studies match the selected filters.</div>';
    updatePagination();
    return;
  }

  slice.forEach(cs => {
    const a = document.createElement('a');
    a.className = 'tile';
    a.href = `./CStemplate.html?id=${cs.id}`;
    a.innerHTML = `
      <div class="tile-eyebrow">Case Study</div>
      <div class="tile-name">${cs.name}</div>
      <div class="tile-tagline">${cs.tagline}</div>
      <div class="tile-tags"></div>
    `;
    grid.appendChild(a);
  });

  updatePagination();
}

function updatePagination() {
  const total      = filtered.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start      = total === 0 ? 0 : page * PAGE_SIZE + 1;
  const end        = Math.min((page + 1) * PAGE_SIZE, total);
  document.getElementById('page-info').textContent = total === 0 ? '0 results' : `${start}\u20133 of ${total}`;
  document.getElementById('btn-prev').disabled = page === 0;
  document.getElementById('btn-next').disabled = page >= totalPages - 1;
}

document.getElementById('btn-prev').addEventListener('click', () => { page--; renderPage(); });
document.getElementById('btn-next').addEventListener('click', () => { page++; renderPage(); });
document.getElementById('clearBtn').addEventListener('click', () => {
  activeFilters = { location: new Set(), industry: new Set(), discipline: new Set() };
  document.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
  page = 0;
  applyFilters();
});

boot();
</script>
</body>
</html>
